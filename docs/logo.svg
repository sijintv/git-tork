<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B26"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3FB950"/>
      <stop offset="1" stop-color="#2EA043"/>
    </linearGradient>
    <linearGradient id="glow" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3FB950" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3FB950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" stroke="#3FB950" stroke-opacity="0.35" stroke-width="4"/>

  <!-- terminal chrome dots -->
  <circle cx="96" cy="88" r="12" fill="#FF5F57"/>
  <circle cx="140" cy="88" r="12" fill="#FEBC2E"/>
  <circle cx="184" cy="88" r="12" fill="#28C840"/>

  <!-- fork / branch glyph -->
  <g stroke="url(#accent)" stroke-width="26" stroke-linecap="round" fill="none">
    <!-- trunk -->
    <path d="M256 408 V 268"/>
    <!-- left branch -->
    <path d="M256 268 C 256 218, 176 230, 176 178"/>
    <!-- right branch -->
    <path d="M256 268 C 256 218, 336 230, 336 178"/>
  </g>
  <!-- nodes -->
  <circle cx="176" cy="160" r="30" fill="#0D1117" stroke="#3FB950" stroke-width="18"/>
  <circle cx="336" cy="160" r="30" fill="#0D1117" stroke="#58A6FF" stroke-width="18"/>
  <circle cx="256" cy="408" r="30" fill="#0D1117" stroke="#3FB950" stroke-width="18"/>

  <!-- prompt caret -->
  <path d="M336 380 l 36 22 -36 22" stroke="#58A6FF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M388 424 h 40" stroke="#58A6FF" stroke-width="16" stroke-linecap="round"/>
</svg>
